<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISM Tools Portal</title>
    <style>
        /* --- 基礎設定 (升級為彈性排版) --- */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;          /* 將整體網頁設為彈性盒子 */
            flex-direction: column; /* 由上往下直向排列 */
        }

        /* --- 頂部導覽列 (Navbar) --- */
        header {
            background-color: #3b82f6;
            background: linear-gradient(90deg, #1e3a8a 0%, #3b82f6 100%);
            min-height: 40px; /* 改用 min-height，讓高度可以根據內容自動撐開 */
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 20px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: relative;
            z-index: 10;
        }

        .logo {
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            line-height: 1.2;
        }

        nav {
            display: flex;
            gap: 15px; 
            flex-wrap: wrap; /* 允許內容換行 */
            justify-content: flex-end; /* 按鈕靠右對齊 */
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 4px 6px;
            border-radius: 4px;
            transition: background 0.3s;
            cursor: pointer; 
        }

        nav a:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        /* --- 主內容區 (Iframe & Welcome) --- */
        #main-container {
            width: 100%;
            flex: 1; /* 取代原本的 calc()，自動佔滿導覽列下方的所有剩餘空間 */
            position: relative;
        }

        /* 歡迎畫面 */
        #welcome-screen {
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1500375592092-40eb2168fd21?q=80&w=2574&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
            transition: opacity 0.5s ease;
            text-align: center; /* 確保文字置中 */
        }

        #welcome-screen h1 {
            font-size: clamp(2.5rem, 5vw, 4rem); /* 讓歡迎標題在手機上自動縮小 */
            margin-bottom: 10px;
        }
        
        #welcome-screen p {
            font-size: clamp(1rem, 3vw, 1.5rem); /* 讓副標題在手機上自動縮小 */
            padding: 0 20px;
        }

        /* 嵌入網頁框架 */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            background-color: #f3f4f6;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 6; 
        }

        /* --- 手機版專屬樣式 (小於 768px 時觸發) --- */
        @media (max-width: 768px) {
            header {
                padding: 10px 15px; /* 稍微縮小左右邊距 */
            }
            .logo {
                max-width: 60px; /* 限制 Logo 寬度，強迫它在手機上排成兩行 */
                font-size: 1.1rem;
            }
            nav {
                width: calc(100% - 70px); /* 讓按鈕區塊佔據剩下的空間 */
                gap: 8px 10px; /* 控制兩排按鈕之間的上下左右距離 */
            }
        }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="logo" onclick="showHome()">ISM PORTAL</div>
        <nav>
            <a onclick="loadPage('https://doclink-wisdom.vercel.app/')">DocLink</a>
            <a onclick="loadPage('https://voyage-check.vercel.app/')">VoyVis</a>
            <a onclick="loadPage('https://quiaudit.vercel.app/')">QuiAudit</a>
            <a onclick="loadPage('https://script.google.com/macros/s/AKfycbwrxJOwYR48I2QKJt0mcr2DwZGHUOz3-Ek20LuH3N_5wOkBC9E2EkD5qJ0OLU3rXLji/exec')">ValiCon</a>
            <a onclick="loadPage('https://psc-rose.vercel.app/')">PSC</a>
            <a onclick="loadPage('https://ship-briefing.vercel.app/')">Video</a>
            
        </nav>
    </header>

    <div id="main-container">
        <div id="welcome-screen">
            <h1>ISM PORTAL</h1>
            <p>Select a tool from the top right menu</p>
        </div>

        <iframe id="content-frame" src=""></iframe>
    </div>

    <script>
        const iframe = document.getElementById('content-frame');
        const welcomeScreen = document.getElementById('welcome-screen');
        const header = document.getElementById('main-header');

        function loadPage(url, isFullscreen = false) {
            welcomeScreen.style.opacity = '0';
            
            setTimeout(() => {
                welcomeScreen.style.display = 'none';
                iframe.style.display = 'block';
                iframe.src = url;

                // 因為改用了 Flex 排版，這裡我們只需要控制 display 即可，高度會自動適應
                if (isFullscreen) {
                    header.style.display = 'none';
                } else {
                    header.style.display = 'flex';
                }
            }, 300);
        }

        function showHome() {
            iframe.style.display = 'none';
            iframe.src = ''; 
            welcomeScreen.style.display = 'flex';
            header.style.display = 'flex'; // 確保導覽列顯示

            setTimeout(() => {
                welcomeScreen.style.opacity = '1';
            }, 10);
        }
    </script>

</body>
</html>
